<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wxp-mkt · 테스트 페이지</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff; text-align: center; padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      padding: 48px 40px; max-width: 560px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    h1 { font-size: 2rem; margin: 0 0 12px; }
    p { font-size: 1.05rem; line-height: 1.7; opacity: 0.95; margin: 8px 0; }
    .badge {
      display: inline-block; margin-top: 20px; padding: 8px 16px;
      background: rgba(255,255,255,0.2); border-radius: 999px; font-size: 0.9rem;
    }
    code { background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 6px; }
    .time { margin-top: 24px; font-size: 0.85rem; opacity: 0.7; }
  </style>
</head>
<body>
  <main class="card">
    <h1>🚀 공개 성공!</h1>
    <p>이 페이지가 보인다면 <strong>GitHub Pages 연결과 배포 파이프라인이 정상 작동</strong>한다는 뜻입니다.</p>
    <p>이제 이 저장소에 파일을 올릴 때마다<br />이 주소에서 전 세계에 공개됩니다.</p>
    <div class="badge">📦 저장소: <code>kyunghyunkim-lang/wxp-mkt</code></div>
    <p class="time">연습용 샘플 페이지 · 민감 정보 없음</p>
  </main>
</body>
</html>
